<svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d">
  <title id="t">Forgeline animated architecture — AI agent reads a Modbus device over MCP, read-only by design</title>
  <desc id="d">Animated dark diagram: an AI agent connects via MCP to the Forgeline read-only server, which reads an industrial Modbus device. Cyan data pulses flow along the connections. Four read-only tools are shown; no write tools exist.</desc>
  <defs>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="13"/>
    </filter>
    <radialGradient id="bgglow" cx="50%" cy="42%" r="48%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#9FB3C8" fill-opacity="0.05"/>
    </pattern>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#22D3EE"/>
    </marker>
    <style>
      text { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; }
      .pri { fill: #E6EDF3; } .sec { fill: #8B98A5; } .cy { fill: #22D3EE; }
      .serif { font-family: Georgia, "Times New Roman", serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill:#C9D1D9; }
      .box { fill: #161B22; stroke: #2A323C; stroke-width: 1.5; }
      .ic { fill:none; stroke:#C9D1D9; stroke-width:1.8; stroke-linejoin:round; stroke-linecap:round; }
      .icc { fill:none; stroke:#22D3EE; stroke-width:2; stroke-linejoin:round; stroke-linecap:round; }
      .flow { stroke:#22D3EE; stroke-width:2.5; fill:none; stroke-dasharray:9 9;
              filter:url(#glow); animation: flow 0.7s linear infinite; }
      @keyframes flow { to { stroke-dashoffset:-36; } }
      .halo { animation: pulse 2.6s ease-in-out infinite; }
      @keyframes pulse { 0%,100%{opacity:.22;} 50%{opacity:.6;} }
      .dot { fill:#67E8F9; filter:url(#glow); animation: travel 1.7s linear infinite; }
      .dot2 { animation-delay: 0.85s; }
      @keyframes travel {
        0%{transform:translateX(0);opacity:0;} 14%{opacity:1;}
        86%{opacity:1;} 100%{transform:translateX(142px);opacity:0;}
      }
      .frame { transition: stroke .25s ease; }
      .core:hover .frame, .core .frame { stroke:#22D3EE; }
      .tool { cursor:pointer; }
      .pill { fill:#13181F; stroke:#2A323C; stroke-width:1.4; transition: stroke .2s ease, fill .2s ease; }
      .tool:hover .pill { stroke:#22D3EE; fill:#10222a; }
      .tool:hover .mono { fill:#E6EDF3; }
    </style>
  </defs>

  <rect x="2" y="2" width="1196" height="696" rx="22" fill="#0B0F14" stroke="#1C2530" stroke-width="1.5"/>
  <rect x="2" y="2" width="1196" height="696" rx="22" fill="url(#dots)"/>
  <ellipse cx="600" cy="300" rx="540" ry="260" fill="url(#bgglow)"/>

  <!-- header -->
  <text x="58" y="78" class="pri serif" font-size="50" font-weight="700">Forgeline</text>
  <text x="60" y="112" class="sec" font-size="19">Read-only Modbus TCP monitoring, exposed as safe MCP tools</text>
  <g>
    <rect x="884" y="121" width="262" height="50" rx="25" fill="#0C1A1E" stroke="#22D3EE" stroke-width="1.6" filter="url(#glow)"/>
    <rect x="901" y="142" width="18" height="13" rx="2.5" class="icc"/>
    <path d="M904,142 v-4 a6,6 0 0 1 12,0 v4" class="icc"/>
    <text x="935" y="151" class="cy" font-size="15" font-weight="700">READ-ONLY BY DESIGN</text>
  </g>

  <!-- glow halo behind core -->
  <rect class="halo" x="476" y="226" width="248" height="158" rx="16" fill="#22D3EE" filter="url(#softglow)"/>

  <!-- node: AI Agent -->
  <g>
    <rect class="box frame" x="80" y="230" width="240" height="150" rx="14"/>
    <g transform="translate(0,2)">
      <circle cx="155" cy="284" r="2.5" class="ic"/>
      <line x1="155" y1="287" x2="155" y2="293" class="ic"/>
      <rect x="133" y="293" width="44" height="34" rx="8" class="ic"/>
      <circle cx="146" cy="308" r="3" fill="#22D3EE"/>
      <circle cx="164" cy="308" r="3" fill="#22D3EE"/>
      <line x1="147" y1="319" x2="163" y2="319" class="ic"/>
    </g>
    <text x="205" y="305" class="pri" font-size="22" font-weight="700">AI Agent</text>
    <text x="205" y="330" class="sec" font-size="15">Any MCP client</text>
  </g>

  <!-- node: Forgeline (core) -->
  <g class="core">
    <rect class="box frame" x="480" y="230" width="240" height="150" rx="14"/>
    <g transform="translate(0,1)">
      <path d="M540,278 L562,287 L562,307 Q562,324 540,332 Q518,324 518,307 L518,287 Z" class="icc" filter="url(#glow)"/>
      <path d="M530,305 L538,313 L552,297" class="icc"/>
    </g>
    <text x="600" y="300" class="cy" font-size="22" font-weight="700">Forgeline</text>
    <text x="600" y="325" class="sec" font-size="15">Read-only MCP server</text>
  </g>

  <!-- node: Modbus device -->
  <g>
    <rect class="box frame" x="880" y="230" width="240" height="150" rx="14"/>
    <g transform="translate(0,0)">
      <rect x="936" y="296" width="42" height="26" class="ic"/>
      <rect x="938" y="282" width="6" height="14" class="ic"/>
      <path d="M948,296 v-6 l8,6 v-6 l8,6 v-6 l8,6" class="ic"/>
      <rect x="942" y="305" width="5" height="5" fill="#C9D1D9"/>
      <rect x="954" y="305" width="5" height="5" fill="#C9D1D9"/>
      <rect x="966" y="305" width="5" height="5" fill="#C9D1D9"/>
    </g>
    <text x="1000" y="305" class="pri" font-size="22" font-weight="700">Modbus device</text>
    <text x="1000" y="330" class="sec" font-size="15">Bundled simulator</text>
  </g>

  <!-- flows + traveling pulses -->
  <line x1="322" y1="305" x2="470" y2="305" class="flow" marker-end="url(#ah)"/>
  <circle class="dot" cx="328" cy="305" r="4.5"/>
  <text x="400" y="292" text-anchor="middle" class="pri" font-size="14" font-weight="600">MCP</text>
  <text x="400" y="327" text-anchor="middle" class="sec" font-size="12.5">stdio / HTTP</text>

  <line x1="722" y1="305" x2="870" y2="305" class="flow" marker-end="url(#ah)"/>
  <circle class="dot dot2" cx="728" cy="305" r="4.5"/>
  <text x="800" y="292" text-anchor="middle" class="pri" font-size="14" font-weight="600">Modbus TCP</text>
  <text x="800" y="327" text-anchor="middle" class="sec" font-size="12.5">read codes only</text>

  <!-- tools -->
  <line x1="60" y1="438" x2="1140" y2="438" stroke="#1C2530" stroke-width="1"/>
  <text x="60" y="473" class="sec" font-size="12.5" font-weight="700" letter-spacing="2">READ-ONLY TOOLS</text>

  <g class="tool">
    <circle cx="122" cy="505" r="11" fill="none" stroke="#34D399" stroke-width="1.8"/>
    <text x="122" y="510" text-anchor="middle" font-size="13" fill="#34D399" font-weight="700">✓</text>
    <rect class="pill" x="142" y="489" width="166" height="33" rx="8"/>
    <text x="225" y="511" text-anchor="middle" class="mono" font-size="14.5">get_device_info</text>
  </g>
  <g class="tool">
    <circle cx="338" cy="505" r="11" fill="none" stroke="#34D399" stroke-width="1.8"/>
    <text x="338" y="510" text-anchor="middle" font-size="13" fill="#34D399" font-weight="700">✓</text>
    <rect class="pill" x="358" y="489" width="218" height="33" rx="8"/>
    <text x="467" y="511" text-anchor="middle" class="mono" font-size="14.5">read_holding_registers</text>
  </g>
  <g class="tool">
    <circle cx="606" cy="505" r="11" fill="none" stroke="#34D399" stroke-width="1.8"/>
    <text x="606" y="510" text-anchor="middle" font-size="13" fill="#34D399" font-weight="700">✓</text>
    <rect class="pill" x="626" y="489" width="202" height="33" rx="8"/>
    <text x="727" y="511" text-anchor="middle" class="mono" font-size="14.5">read_input_registers</text>
  </g>
  <g class="tool">
    <circle cx="858" cy="505" r="11" fill="none" stroke="#34D399" stroke-width="1.8"/>
    <text x="858" y="510" text-anchor="middle" font-size="13" fill="#34D399" font-weight="700">✓</text>
    <rect class="pill" x="878" y="489" width="126" height="33" rx="8"/>
    <text x="941" y="511" text-anchor="middle" class="mono" font-size="14.5">read_coils</text>
  </g>

  <text x="60" y="556" font-size="16.5">
    <tspan fill="#F87171" font-weight="700">✗ </tspan><tspan class="pri">No write tools exist — the agent can </tspan><tspan class="pri" font-weight="700">observe</tspan><tspan class="pri">, never </tspan><tspan class="pri" font-weight="700">alter</tspan><tspan class="pri">, device state.</tspan>
  </text>

  <!-- footer -->
  <line x1="60" y1="602" x2="1140" y2="602" stroke="#1C2530" stroke-width="1"/>
  <text x="600" y="638" text-anchor="middle" class="sec" font-size="14">Python · Model Context Protocol · pymodbus · Docker · Apache-2.0</text>
  <text x="600" y="664" text-anchor="middle" class="cy" font-size="14.5" font-weight="700">github.com/codenikhildr/Forgeline</text>
</svg>
